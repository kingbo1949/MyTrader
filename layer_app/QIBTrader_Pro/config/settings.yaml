# config/settings.yaml
symbols:
  NQ:
    multiplier: 20.0  # Nasdaq 100 每点 $20
    commission: 2.0   # 每手手续费 (预留)
  ES:
    multiplier: 50.0  # S&P 500 每点 $50
    commission: 2.0

# 全局运行环境配置
environment:
  # mode 可选值: "backtest" (回测), "real" (真实柜台/实盘)
  mode: "backtest"
  qdatabase_proxy: "QServer/IBQDatabase:tcp -h 10.0.0.64 -p 10000"
# config/portfolio_analyzer.yaml
# 手工组合绩效分析配置
# 运行: cd layer_app/StrategyEngine && PYTHONPATH=ice:src python3 scripts/portfolio_analyzer.py
#
# strategy 字段可选，默认为 UTurnBottomShortPut
#   UTurnBottomShortPut  → 底部 mix uturn 卖 Bull Put Spread（direction: LONG）
#   UTurnBottomShortCall → 顶部 mix uturn 卖 Bear Call Spread（direction: SHORT）
analyze:
  initial_capital: 100000

  # 手工指定要分析的品种组合（取消注释后运行）
  portfolio:
